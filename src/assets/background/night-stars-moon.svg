<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
  </defs>

  <!-- Luna llena (blanco - resalta en fondo oscuro) -->
  <g>
    <!-- Glow lunar -->
    <circle cx="1600" cy="250" r="95" fill="white" opacity="0.08"/>
    <circle cx="1600" cy="250" r="80" fill="white" opacity="0.15"/>
    <circle cx="1600" cy="250" r="70" fill="white" opacity="0.12"/>

    <!-- Cráteres lunares -->
    <circle cx="1580" cy="240" r="12" fill="white" opacity="0.08"/>
    <circle cx="1620" cy="260" r="8" fill="white" opacity="0.06"/>
    <circle cx="1610" cy="235" r="6" fill="white" opacity="0.07"/>
    <circle cx="1585" cy="265" r="5" fill="white" opacity="0.05"/>
    <circle cx="1625" cy="245" r="4" fill="white" opacity="0.04"/>
  </g>

  <!-- Nubes (negro - resalta en fondo claro) con bordes suavizados -->
  <g opacity="0.12">
    <ellipse cx="300" cy="200" rx="120" ry="40" fill="black"/>
    <ellipse cx="250" cy="210" rx="80" ry="35" fill="black"/>
    <ellipse cx="350" cy="215" rx="90" ry="38" fill="black"/>

    <ellipse cx="800" cy="150" rx="140" ry="45" fill="black"/>
    <ellipse cx="750" cy="165" rx="90" ry="40" fill="black"/>
    <ellipse cx="860" cy="170" rx="100" ry="42" fill="black"/>

    <ellipse cx="500" cy="800" rx="130" ry="42" fill="black"/>
    <ellipse cx="450" cy="815" rx="85" ry="38" fill="black"/>
    <ellipse cx="560" cy="820" rx="95" ry="40" fill="black"/>

    <ellipse cx="1300" cy="850" rx="150" ry="48" fill="black"/>
    <ellipse cx="1240" cy="865" rx="95" ry="42" fill="black"/>
    <ellipse cx="1370" cy="870" rx="105" ry="45" fill="black"/>
  </g>

  <!-- Sombras suaves de nubes -->
  <g opacity="0.05">
    <ellipse cx="300" cy="200" rx="140" ry="50" fill="black"/>
    <ellipse cx="800" cy="150" rx="160" ry="55" fill="black"/>
    <ellipse cx="500" cy="800" rx="150" ry="50" fill="black"/>
    <ellipse cx="1300" cy="850" rx="170" ry="58" fill="black"/>
  </g>

  <!-- Estrellas grandes (blanco - resalta en fondo oscuro) -->
  <g fill="white">
    <circle cx="200" cy="150" r="3" opacity="0.4"/>
    <circle cx="450" cy="100" r="2.5" opacity="0.35"/>
    <circle cx="650" cy="250" r="3" opacity="0.38"/>
    <!-- Estrellas sueltas estratégicas -->
    <circle cx="950" cy="180" r="2" opacity="0.36"/>
    <circle cx="1200" cy="120" r="2.5" opacity="0.4"/>
    <circle cx="1450" cy="400" r="3" opacity="0.37"/>
    <circle cx="1750" cy="500" r="2.5" opacity="0.39"/>
    <circle cx="350" cy="450" r="2" opacity="0.34"/>
    <circle cx="180" cy="650" r="2.5" opacity="0.36"/>
    <circle cx="600" cy="550" r="3" opacity="0.41"/>
    <circle cx="1100" cy="700" r="2" opacity="0.35"/>
    <circle cx="1500" cy="650" r="2.5" opacity="0.38"/>
  </g>

  <!-- Estrellas medianas (blanco para llenar espacios) -->
  <g fill="white" opacity="0.28">
    <circle cx="300" cy="100" r="1.8"/>
    <circle cx="550" cy="180" r="1.6"/>
    <circle cx="900" cy="150" r="1.7"/>
    <circle cx="1300" cy="250" r="1.8"/>
    <circle cx="400" cy="320" r="1.6"/>
    <circle cx="1000" cy="500" r="1.7"/>
    <circle cx="1600" cy="350" r="1.8"/>
    <circle cx="200" cy="800" r="1.6"/>
    <circle cx="900" cy="850" r="1.7"/>
    <circle cx="1700" cy="850" r="1.6"/>
  </g>

  <!-- Estrellas pequeñas (blanco - resalta en fondo oscuro) -->
  <g fill="white" opacity="0.35">
    <circle cx="320" cy="300" r="1.5"/>
    <circle cx="580" cy="350" r="1"/>
    <circle cx="850" cy="280" r="1.5"/>
    <circle cx="1050" cy="320" r="1"/>
    <circle cx="1350" cy="180" r="1.5"/>
    <circle cx="1650" cy="450" r="1"/>
    <circle cx="280" cy="550" r="1.5"/>
    <circle cx="750" cy="650" r="1"/>
    <circle cx="1250" cy="550" r="1.5"/>
    <circle cx="1700" cy="750" r="1"/>
    <circle cx="400" cy="750" r="1.5"/>
    <circle cx="900" cy="850" r="1"/>
    <circle cx="120" cy="380" r="1"/>
    <circle cx="1800" cy="320" r="1.5"/>
    <circle cx="500" cy="450" r="1"/>
    <circle cx="1150" cy="450" r="1.5"/>
  </g>

  <!-- Constelaciones (líneas cyan sutiles) -->
  <g stroke="oklch(0.8 0.15 200)" stroke-width="2" opacity="0.12" stroke-linecap="round" stroke-linejoin="round" style="" transform="matrix(1, 0, 0, 1, 0, 150.000002)">
    <!-- Osa Mayor -->
    <line x1="200" y1="150" x2="280" y2="200"></line>
    <line x1="280" y1="200" x2="350" y2="180"></line>
    <line x1="350" y1="180" x2="420" y2="220"></line>
    <line x1="420" y1="220" x2="480" y2="160"></line>
    <line x1="480" y1="160" x2="520" y2="240"></line>
    <line x1="520" y1="240" x2="450" y2="100"></line>
    <line x1="450" y1="100" x2="200" y2="150"></line>

    <!-- Orión -->
    <line x1="650" y1="250" x2="750" y2="280"></line>
    <line x1="750" y1="280" x2="850" y2="260"></line>
    <line x1="850" y1="260" x2="700" y2="350"></line>
    <line x1="700" y1="350" x2="800" y2="380"></line>
    <line x1="800" y1="380" x2="750" y2="280"></line>

    <!-- Líneas conectoras extras para más interés visual -->
    <line x1="520" y1="240" x2="600" y2="300"></line>
    <line x1="1200" y1="120" x2="1450" y2="400"></line>
    <line x1="1450" y1="400" x2="1750" y2="500"></line>
  </g>

  <!-- Puntos de intersección de constelaciones -->
  <g fill="white" opacity="0.15" transform="matrix(1, 0, 0, 1, 0, 152.500002)">
    <!-- Osa Mayor nodes -->
    <circle cx="200" cy="150" r="3"/>
    <circle cx="280" cy="200" r="3"/>
    <circle cx="350" cy="180" r="3"/>
    <circle cx="420" cy="220" r="3"/>
    <circle cx="480" cy="160" r="3"/>
    <circle cx="520" cy="240" r="3"/>
    <circle cx="450" cy="100" r="3"/>

    <!-- Orión nodes -->
    <circle cx="650" cy="250" r="3"/>
    <circle cx="750" cy="280" r="3"/>
    <circle cx="850" cy="260" r="3"/>
    <circle cx="700" cy="350" r="3"/>
    <circle cx="800" cy="380" r="3"/>
  </g>
</svg>
